<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Get Từ Vựng IELTS Từ Các Bài Báo | VOCAB.VN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 IELTS Vocab Scraper</h1>
        <p>Dán link bài báo tiếng Anh vào đây để cào từ vựng tự động</p>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://www.bbc.com/news/...">
            <button id="scrapeBtn" onclick="scrapeData()">Phân Tích</button>
        </div>

        <div id="loading" class="hidden">
            ⏳ Đang cào dữ liệu và dịch thuật (Có thể mất 5-10 giây)...
        </div>

        <div id="error" class="hidden error-msg"></div>

        <div id="result" class="grid-container">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
