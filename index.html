<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Vocab Scraper Pro V2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo"><i class="fa-solid fa-rocket"></i> Vocab Scraper <span>Pro</span></div>
            <div class="header-actions">
                <button id="themeToggle" class="icon-btn" title="Bật/Tắt Giao Diện Tối"><i class="fa-solid fa-moon"></i></button>
                <a href="https://vnschool.vercel.app/" target="_blank" class="header-link"><i class="fa-solid fa-book"></i> Kho Tài Liệu</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="hero">
            <h1>Chinh Phục Từ Vựng IELTS</h1>
            <p>Trích xuất từ vựng học thuật, dịch nghĩa, tìm từ đồng nghĩa và tạo thẻ Flashcard tự động.</p>
        </div>
        
        <div class="input-section">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('url')"><i class="fa-solid fa-link"></i> Nhập Link URL</button>
                <button class="tab-btn" onclick="switchTab('text')"><i class="fa-solid fa-align-left"></i> Dán Văn Bản (Text)</button>
            </div>
            
            <div id="urlTab" class="tab-content active">
                <div class="search-box">
                    <input type="text" id="urlInput" placeholder="Nhập link bài báo tiếng Anh (VD: https://cnn.com/...)">
                </div>
            </div>

            <div id="textTab" class="tab-content hidden">
                <textarea id="textInput" rows="5" placeholder="Dán đoạn văn bản tiếng Anh của bạn vào đây (Rất hữu ích khi web báo chặn cào dữ liệu)..."></textarea>
            </div>

            <button id="scrapeBtn" class="primary-btn" onclick="scrapeData()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Phân Tích Ngay
            </button>
        </div>

        <div id="loading" class="hidden status-msg">
            <i class="fa-solid fa-spinner fa-spin"></i> Đang phân tích từ vựng, ngữ cảnh và từ đồng nghĩa...
        </div>

        <div id="error" class="hidden status-msg error"></div>

        <div id="actionArea" class="hidden action-area">
            <button onclick="downloadCSV()" class="download-btn"><i class="fa-solid fa-download"></i> Tải file Anki / Quizlet (.csv)</button>
        </div>

        <div id="result" class="grid-container"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Copyright by <a href="https://t.me/tolabimat" target="_blank">@vnsoftware</a>.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
